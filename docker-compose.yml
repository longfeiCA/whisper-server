services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whisper-server
    restart: unless-stopped
    ports:
      - "0.0.0.0:8081:8000"
    volumes:
      - ./models:/root/.cache/whisper
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: whisper-network